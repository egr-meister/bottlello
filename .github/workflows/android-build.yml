name: Android Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build signed release APK and AAB
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm install

      - name: Pre-flight checks
        run: |
          npx expo install --fix
          npx expo-doctor
          npx expo install --check

      - name: Install Android SDK Platform 35/36 and Build Tools
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses > /dev/null 2>&1 || true
          "$SDKMANAGER" "platforms;android-35" "build-tools;35.0.0"
          "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0"

      - name: Decode release keystore from GitHub Secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 secret is missing" >&2
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/bottlello-release-key.p12"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/bottlello-release-key.p12" >> "$GITHUB_ENV"

      - name: Prepare Android build
        run: chmod +x android/gradlew

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Build signed release AAB
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon

      - name: Verify APK signature (fail on debug certificate)
        run: |
          APK=android/app/build/outputs/apk/release/app-release.apk
          APKSIGNER="$ANDROID_HOME/build-tools/35.0.0/apksigner"
          echo "Signing certificate:"
          "$APKSIGNER" verify --print-certs "$APK" | tee cert-info.txt
          if grep -q "CN=Android Debug" cert-info.txt; then
            echo "ERROR: release APK is signed with a debug certificate" >&2
            exit 1
          fi
          echo "Signature OK: not a debug certificate."

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: bottlello-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Upload release AAB (Google Play upload artifact)
        uses: actions/upload-artifact@v4
        with:
          name: bottlello-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
